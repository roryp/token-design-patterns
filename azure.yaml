name: tokenflow-lab
metadata:
  template: tokenflow-lab@0.1.0
services:
  web:
    project: .
    language: docker
    host: containerapp
    resourceName: ${AZURE_CONTAINER_APP_NAME}
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
infra:
  provider: bicep
  path: infra