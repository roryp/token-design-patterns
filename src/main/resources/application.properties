spring.application.name=token-design-patterns
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
spring.web.error.include-message=always

token-patterns.openai.api-key=${OPENAI_API_KEY:}
token-patterns.openai.endpoint=${AZURE_OPENAI_ENDPOINT:}
token-patterns.openai.managed-identity=${AZURE_OPENAI_USE_MANAGED_IDENTITY:false}
token-patterns.openai.small-model=${TOKEN_PATTERNS_SMALL_MODEL:gpt-5.6-luna}
token-patterns.openai.medium-model=${TOKEN_PATTERNS_MEDIUM_MODEL:gpt-5.6-terra}
token-patterns.openai.large-model=${TOKEN_PATTERNS_LARGE_MODEL:gpt-5.6-sol}